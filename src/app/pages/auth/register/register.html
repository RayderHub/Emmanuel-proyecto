<div class="auth-container">
  <p-card header="Registro">
    <div class="field">
      <label for="username">Usuario</label>
      <input id="username" type="text" pInputText placeholder="Nombre de usuario" />
    </div>
    <div class="field">
      <label for="email">Correo</label>
      <input id="email" type="email" pInputText placeholder="tu@correo.com" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <p-password inputId="password" toggleMask [feedback]="false" />
    </div>
    <div class="actions">
      <button pButton label="Registrarse" severity="primary"></button>
      <button pButton label="Ya tengo cuenta" severity="secondary" [text]="true" routerLink="/auth/login"></button>
    </div>
  </p-card>
</div>
