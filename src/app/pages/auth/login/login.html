<app-sidebar></app-sidebar>
<div class="login-page">
  <p-toast />
  <div class="auth-box">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <i class="pi pi-bolt"></i>
      </div>
      <div>
        <div class="auth-logo-name">EmmanuelApp</div>
      </div>
    </div>

    <h1 class="auth-title">Bienvenido de vuelta</h1>
    <p class="auth-subtitle">Ingresa tus credenciales para continuar</p>

    <div class="form-group">
      <label class="form-label" for="username">Usuario</label>
      <input id="username" type="text" class="form-input" placeholder="Ingresa tu usuario" [(ngModel)]="username"
        name="username" [class.input-error]="loginError" (keyup.enter)="onLogin()" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Contraseña</label>
      <p-password inputId="password" [(ngModel)]="password" toggleMask [feedback]="false" styleClass="w-full"
        inputStyleClass="form-input w-full" [ngClass]="{ 'ng-invalid ng-dirty': loginError }"
        (keyup.enter)="onLogin()" />
    </div>

    @if (loginError) {
    <div class="error-alert">
      <i class="pi pi-exclamation-circle"></i>
      <span>Usuario o contraseña incorrectos</span>
    </div>
    }

    <button class="btn-submit" [disabled]="!username || !password || loading" (click)="onLogin()">
      @if (loading) {
      <i class="pi pi-spin pi-spinner"></i>
      Verificando...
      } @else {
      <i class="pi pi-sign-in"></i>
      Iniciar Sesión
      }
    </button>

    <!-- Credenciales de prueba -->
    <div class="credentials-hint">
      <p class="hint-title"><i class="pi pi-info-circle"></i> Usuarios</p>
      <div class="hint-user">
        <span class="hint-label">Usuario:</span>
        <code>usuario</code> / <code>user123</code>
      </div>
      <div class="hint-user">
        <span class="hint-label">Superusuario:</span>
        <code>superusuario</code> / <code>super123</code>
      </div>
    </div>
  </div>
</div>
