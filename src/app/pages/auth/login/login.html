<div class="auth-container">
  <p-card header="Iniciar sesión">
    <div class="field">
      <label for="email">Correo</label>
      <input id="email" type="email" pInputText placeholder="tu@correo.com" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <p-password inputId="password" toggleMask [feedback]="false" />
    </div>
    <div class="actions">
      <button pButton label="Entrar" severity="primary"></button>
      <button pButton label="Crear cuenta" severity="secondary" [text]="true" routerLink="/auth/register"></button>
    </div>
  </p-card>
</div>
