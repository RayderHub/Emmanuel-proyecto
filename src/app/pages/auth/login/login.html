<div class="auth-container">
  <p-toast />
  <p-card header="Iniciar sesión">
    <div class="field">
      <label for="email">Correo</label>
      <input id="email" type="email" pInputText placeholder="tu@correo.com" [(ngModel)]="email"
        [ngClass]="{ 'ng-invalid ng-dirty': loginError }" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <p-password inputId="password" [(ngModel)]="password" toggleMask [feedback]="false"
        [ngClass]="{ 'ng-invalid ng-dirty': loginError }" />
    </div>

    @if (loginError) {
    <p-message severity="error" text="Correo o contraseña incorrectos" styleClass="w-full mb-3" />
    }

    <div class="actions">
      <button pButton label="Entrar" severity="primary" [disabled]="!email || !password" (click)="onLogin()"></button>
      <button pButton label="Crear cuenta" severity="secondary" [text]="true" routerLink="/auth/register"></button>
    </div>
  </p-card>
</div>
